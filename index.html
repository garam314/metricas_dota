<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manquitos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        .celda {
            height: 100%;
            background-size: cover;
            background-position: center;
        }

        .text_name {
            padding: 10px;
            color: white;
            width: 100%;
            background-color: rgb(0, 0, 0, 0.3);
            height: 100%;
            text-align: center;
            border-radius: 10px;
            align-content: center;
        }

        .css_img {
            background-position: center center;
            background-size: cover;
            background-repeat: no-repeat;
            border-radius: 10px;
            height: 250px;
            width: 100%;
        }

        #damage {
            background-image: url("./img/img1.png");
        }

        #gold {
            background-image: url("./img/img2.png");
        }

        #kda {
            background-image: url("./img/img3.png");
        }

        #lh {
            background-image: url("./img/img4.png");
        }

        #wins {
            background-image: url("./img/img5.png");
        }

        #scores {
            background-image: url("./img/img6.png");
        }

        a:link {
            text-decoration: none;
        }
    </style>

</head>

<body>

    <div class="container mt-4 mb-4">

        <div class="d-flex flex-column gap-3">
            <div id="damage" class="m-auto css_img">
                <a href="./Damage.html">
                    <div class="celda">
                        <p class="text_name h4">Damage</p>
                    </div>
                </a>
            </div>

            <div id="gold" class="m-auto css_img">
                <a href="./Gold_Spent.html">
                    <div class="celda">
                        <p class="text_name h4">Gold</p>
                    </div>
                </a>
            </div>

            <div id="kda" class="m-auto css_img">
                <a href="./KDA.html">
                    <div class="celda css_img">
                        <p class="text_name h4">KDA</p>
                    </div>
                </a>
            </div>

            <div id="lh" class="m-auto css_img">
                <a href="./Last_Hits.html">
                    <div class="celda css_img">
                        <p class="text_name h4">Last Hits</p>
                    </div>
                </a>
            </div>

            <div id="wins" class="m-auto css_img">
                <a href="./Victorias.html">
                    <div class="celda css_img">
                        <p class="text_name h4">Vitorias</p>
                    </div>
                </a>
            </div>

            <div id="scores" class="m-auto css_img">
                <a href="./Scores.html">
                    <div class="celda css_img">
                        <p class="text_name h4">Scores</p>
                    </div>
                </a>
            </div>
        </div>

    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>

</html>
